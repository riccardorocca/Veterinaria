<!DOCTYPE HTML>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codo</title> <!-- Nombre que queremos que salga en la pestaña del navegador -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <iframe style="position:fixed; width:100%; height:100%; border:0" src="" id="api-frame"
    sandbox="allow-scripts allow-same-origin allow-popups allow-forms" allow="autoplay; fullscreen; vr" allowvr
    allowfullscreen mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>

  <div class="img-container1"><img src="./img/logo-vet.png"></div>
  <div class="buttons"> <!--Estos son los botones que salen a la dch de la pantalla -->
    <button class="showButton" id="keyH1" onclick="showAndHide('H1', 'keyH1')">Hueso Humero</button>
    <button class="showButton" id="keyH2" onclick="showAndHide('H2', 'keyH2')">Hueso Radio</button>
    <button class="showButton" id="keyH3" onclick="showAndHide('H3', 'keyH3')">Hueso Ulna/Cubito</button>
    <button class="showButton" id="keyH4" onclick="showAndHide('H4', 'keyH4')">Hueso Sesamoideo del m. supinador</button>
    <button class="showButton" id="keyL1" onclick="showAndHide('L1', 'keyL1')">Ligamento anular</button>
    <button class="showButton" id="keyL2" onclick="showAndHide('L2', 'keyL2')">Ligamento colateral lateral caudal</button>
    <button class="showButton" id="keyL3" onclick="showAndHide('L3', 'keyL3')">Ligamento colateral lateral craneal</button>
    <button class="showButton" id="keyL4" onclick="showAndHide('L4', 'keyL4')">Ligamento colateral medial caudal</button>
    <button class="showButton" id="keyL5" onclick="showAndHide('L5', 'keyL5')">Ligamento colateral medial craneal</button>
    <button class="showButton" id="keyL6" onclick="showAndHide('L6', 'keyL6')">Ligamento del olecranon</button>
    <button class="showButton" id="keyL7" onclick="showAndHide('L7', 'keyL7')">Ligamento interóseo</button>
    <button class="showButton" id="keyL8" onclick="showAndHide('L8', 'keyL8')">Ligamento oblicuo</button>
    <button class="showButton" id="keyM1" onclick="showAndHide('M1', 'keyM1')">Musculo pronador redondo</button>
    <button class="showButton" id="keyM2" onclick="showAndHide('M2', 'keyM2')">Musculo supinador</button>
    <button class="showButton" id="keyN1" onclick="showAndHide('N1', 'keyN1')">Nervio mediano</button>
    <button class="showButton" id="keyN2" onclick="showAndHide('N2', 'keyN2')">Nervio radial</button>
    <button class="showButton" id="keyN3" onclick="showAndHide('N3', 'keyN3')">Nervio ulnar</button>
    <button class="showButton" id="keyT1" onclick="showAndHide('T1', 'keyT1')">Tendón del m. biceps braquial</button>
    <button class="showButton" id="keyT2" onclick="showAndHide('T2', 'keyT2')">Tendón del m. braquial</button>
  </div>

  <div class="img-container2"> <!-- logo esquina -->
    <img src="./img/logo-ucm.png">
  </div>

  <script type="text/javascript" src="https://static.sketchfab.com/api/sketchfab-viewer-1.5.1.js"></script>
  <script>
    const model = 'ba800db8c4574ec0ac6a32973fc61a22'; // Modelo de referencia a Sketchfab,este fichero cuando lo abres irá al modelo de ese código

    const filteredNodes = {}; // Objeto para guardar nombres de nodos, y si se debe mostrar o no. Ejemplo --> { "A" : { show: true, instanceId: 4} }
    let apiRef; // Referencia a la api, para poder llamarla fuera del evetListener

    //INICIO Sketchfab
    //Asi se llama a la versión de api que esté actualmente
    iframe = document.getElementById('api-frame');
    client = new Sketchfab( iframe);

    error = function () {
      console.error('Sketchfab API Error!');
    },

    success = function (api) {
      apiRef = api; //Aquí ya estamos nombrando a la variable creada por nosotros
                    //para poder usarla fuera de lo de Sketchfab
      api.start();
      // Wait for viewer to be ready
      api.addEventListener('viewerready', function () {
        // Get the object nodes
        api.getNodeMap(function (err, nodes) {
          if (!err) {
            for ( const prop in nodes ) {
              if ( nodes.hasOwnProperty( prop ) ) {
                const name = nodes[ prop ].name;
                filteredNodes[name] = {   //Aquí va rellenando nuestro objeto creado arriba
                  show: true,
                  instanceId : nodes[prop].instanceID
                };
              };
            };
          };
        });
      });
    };

    client.init(model, {
      success: success,
      error: error,
      ui_infos: 0,
      ui_controls: 0,
      ui_stop: 1,
      watermark: 1,
      supersample: 0
    });
    //FIN Sketchfab

    // Funciones Propias
    //creadas para solo tener que llamarlas desde el .HTML
    function showAndHide(nodeName, buttonId) {
      const btn = document.getElementById(buttonId);
      filteredNodes[nodeName].show = !filteredNodes[nodeName].show;

      if (filteredNodes[nodeName].show) {
        btn.classList.replace("hideButton","showButton");
        apiRef.show(filteredNodes[nodeName].instanceId)
      } else {
        btn.classList.replace("showButton", "hideButton");
        apiRef.hide(filteredNodes[nodeName].instanceId)
      };
    };
  </script>

  <style type="text/css">
    body {
      margin: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Para modificar posición y tamaño boton veterinaria UCM */
    .img-container1 {
      position: absolute;
      margin: 0px 5px;
      top: 45px;
      width: 150px;
      right: 0px;
    }

    /* Para modificar posición y tamaño Escudo UCM */
    .img-container2 {
      position: absolute;
      bottom: 22px;
      left: 22px;
      width: 122px;
    }

    /* Para elegir opacidad de las imagenes de los logos */
    img {
      width: 100%;
      opacity: 0.8;
    }

    /* Button style, Para cambiar el estilo de los botones */
    .buttons {
      position: absolute;
      margin: 35px 5px;
      right: 0;
      top: 45px;
      z-index: 1;
    }

    button {
      width: 250px;
      height: 30px;
      line-height: 21px;
      text-transform: none;
      color: white;
      opacity: 0.8;
      border: none;
      border-radius: 5px;
      text-align: center;
      display: block;
      margin-top: 2px;
    }

    /* Para poder elegir el color del boton cuando se enciende */
    .showButton {
      background: #1caad9;
    }

    /* Para poder elegir el color del boton cuando se apaga */
    .hideButton {
      background: #888888;
    }

    /*Esto hace que cuando pasa el raton por encima se ilumine levemente el botón*/
    button:hover {
      opacity: 1;
    }

    button:active {
      font-weight: bold;
    }

  </style>
</body>
</html>
